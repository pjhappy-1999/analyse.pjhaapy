<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>START 可视化简版</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="start_echarts_data.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; box-sizing: border-box; }
        .chart-container {
            width: 100%;
            max-width: 1200px;
            margin: 20px auto;
            background: #fff;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        #chart_timeseries {
            height: 420px;
        }
        #chart_corr, #chart_corr_rel {
            height: 420px;
        }
        #chart_volatility_final {
            height: 460px;
        }
        #chart_best_heatmap {
            height: 420px;
        }
        #chart_lag_heatmap_core {
            height: 420px;
        }
        #chart_lags {
            height: 420px;
        }
        .note-small {
            max-width: 1200px;
            margin: 0 auto 10px auto;
            color: #666;
            font-size: 12px;
            line-height: 1.5;
        }
        #chart_predictors {
            height: 600px;
        }
        .corr-table {
            width: 100%;
            max-width: 1200px;
            margin: 10px auto 30px auto;
        }
        .corr-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .corr-table th, .corr-table td {
            padding: 6px 8px;
            border-bottom: 1px solid #ddd;
        }
        .corr-table th {
            text-align: left;
        }
        .corr-table td.value {
            text-align: right;
        }
        .section-title {
            max-width: 1200px;
            margin: 40px auto 20px auto;
            border-bottom: 2px solid #2196F3;
            padding-bottom: 10px;
            color: #333;
        }
        .doc-section {
            max-width: 1200px;
            margin: 20px auto;
            background: #fdfdfd;
            padding: 20px;
            border-left: 5px solid #FF9800;
            line-height: 1.6;
        }
        .formula {
            background: #eee;
            padding: 10px;
            border-radius: 4px;
            font-family: "Times New Roman", Times, serif;
            font-style: italic;
            text-align: center;
            margin: 10px 0;
        }
        code {
            background: #f4f4f4;
            padding: 2px 4px;
            border-radius: 4px;
            color: #d63384;
        }
        .control-panel {
            max-width: 1200px;
            margin: 0 auto 10px auto;
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 4px 8px;
        }
        .control-panel label {
            color: #333;
        }
        .control-panel select {
            padding: 6px 10px;
        }
    </style>
</head>
<body>

<h2 class="section-title">📊 1. 原始数据概览 (Raw Data Overview)</h2>
<div class="chart-container" id="chart_timeseries"></div>

<h2 class="section-title">🔗 2. 相关性分析 (Correlation Analysis)</h2>
<div class="chart-container" id="chart_corr"></div>
<div class="corr-table" id="corr_values_gdp"></div>
<div class="chart-container" id="chart_corr_rel"></div>
<div class="corr-table" id="corr_values_rel"></div>

<h2 class="section-title">📉 3. 波动率与滞后弹性（基础数据处理）</h2>
<div class="chart-container" id="chart_volatility_final"></div>
<div class="chart-container" id="chart_best_heatmap"></div>
<div class="chart-container" id="chart_lag_heatmap_core"></div>
<div class="note-small">
    说明：价格波动采用 ΔLog；为提升与宏观的匹配度，我们引入 EWMA 平滑与预白化冲击（创新项），并在滞后维度上比较 r[ΔLog(权重GDP)<sub>t</sub>, X<sub>t−k</sub>]。上图选取每个商品“优先显著且 |r| 最大”的方法与滞后作为最优结果；下图展示基于 EWMA 的滞后相关全貌。后文将给出波动计算方式与滞后处理的细节说明。
</div>
<div class="corr-table" id="dl_results_table"></div>

<script>
    var timeChartDom = document.getElementById("chart_timeseries");
    var timeChart = echarts.init(timeChartDom);

    var timeOption = {
        title: {
            text: "原油价格、主要粮油价格与中国GDP（季度）",
            left: "center",
            top: 10
        },
        tooltip: {
            trigger: "axis"
        },
        legend: {
            top: 50,
            left: "center",
            data: [
                "原油价格",
                "小麦(USD)",
                "玉米(USD)",
                "大豆(USD)",
                "棉花(USD)",
                "棕榈油(USD)",
                "中国GDP",
                "第一产业拉动占比"
            ]
        },
        grid: {
            top: 120,
            left: "10%",
            right: "15%",
            bottom: 60,
            containLabel: true
        },
        toolbox: {
            feature: {
                saveAsImage: {}
            }
        },
        xAxis: {
            type: "category",
            data: quarters,
            axisLabel: {
                rotate: 45
            }
        },
        yAxis: [
            {
                type: "value",
                name: "农产品价格",
                position: "left"
            },
            {
                type: "value",
                name: "中国GDP",
                position: "right",
                splitLine: {
                    show: false
                }
            },
            {
                type: "value",

                    show: false

                    show: false
                }

        ],
        dataZoom: [
            {
                type: "slider",
                start: 0,
                end: 100
            },
            {
                type: "inside"
            }
        ],
        series: [
            {
                name: "原油价格",
                type: "line",
                yAxisIndex: 2,
                data: oil
            },
            {
                name: "小麦(USD)",
                type: "line",
                yAxisIndex: 0,
                data: wheat
            },
            {
                name: "玉米(USD)",
                type: "line",
                yAxisIndex: 0,
                data: maize
            },
            {
                name: "大豆(USD)",
                type: "line",
                yAxisIndex: 0,
                data: soybeans
            },
            {
                name: "棉花(USD)",
                type: "line",
                yAxisIndex: 0,
                data: cotton
            },
            {
                name: "棕榈油(USD)",
                type: "line",
                yAxisIndex: 0,
                data: palm_oil
            },
            {
                name: "中国GDP",
                type: "line",
                yAxisIndex: 1,
                data: gdp
            },
            {
                name: "第一产业拉动占比",
                type: "line",
                step: "end",
                yAxisIndex: 3,
                data: primary_share
            }
        ]
    };

    timeChart.setOption(timeOption);

    var corrData = [];
    for (var i = 0; i < corrVars.length; i++) {
        var value = (corrWithGdp && corrWithGdp[i] != null) ? corrWithGdp[i] : 0;
        corrData.push([i, 0, value]);
    }

    if (typeof distLagResults !== "undefined" && distLagResults) {
        var tbl = document.getElementById("dl_results_table");
        var items = [];
        Object.keys(distLagResults).forEach(function(k) {
            var r = distLagResults[k] || {};
            items.push({
                name: r.name || k,
                bestLag: r.best_lag,
                rBest: r.r_best_lag,
                r0: r.r0,
                rRoll: r.r_roll_mean_4,
                rMulti: r.r_multi,
                r2Multi: r.r2_multi,
                n: r.n_multi
            });
        });
        items.sort(function(a, b) {
            var A = isFinite(a.r2Multi) ? a.r2Multi : -1e9;
            var B = isFinite(b.r2Multi) ? b.r2Multi : -1e9;
            return B - A;
        });
        var html = '<div style="font-weight:bold;margin:6px 0;">分布式滞后解释力（单品多滞后 OLS）</div>';
        html += '<table><thead><tr>';
        html += '<th>商品</th><th>最佳Lag</th><th style="text-align:right;">r(最佳Lag)</th><th style="text-align:right;">r(当期)</th><th style="text-align:right;">r(滚动均值4)</th><th style="text-align:right;">r(多滞后)</th><th style="text-align:right;">R²(多滞后)</th><th style="text-align:right;">N</th>';
        html += '</tr></thead><tbody>';
        items.forEach(function(it) {
            function fmt(x) { return (x == null || !isFinite(x)) ? '-' : Number(x).toFixed(3); }
            html += '<tr>';
            html += '<td>' + it.name + '</td>';
            html += '<td>' + (it.bestLag == null ? '-' : ('Lag ' + it.bestLag)) + '</td>';
            html += '<td style="text-align:right;">' + fmt(it.rBest) + '</td>';
            html += '<td style="text-align:right;">' + fmt(it.r0) + '</td>';
            html += '<td style="text-align:right;">' + fmt(it.rRoll) + '</td>';
            html += '<td style="text-align:right;">' + fmt(it.rMulti) + '</td>';
            html += '<td style="text-align:right;">' + fmt(it.r2Multi) + '</td>';
            html += '<td style="text-align:right;">' + (it.n || '-') + '</td>';
            html += '</tr>';
        });
        html += '</tbody></table>';
        html += '<div style="color:#666;margin-top:6px;">表中 r(多滞后)/R² 来自“同一商品多滞后+季度哑变量”的线性拟合，展示相较单一滞后或当期的解释力提升。</div>';
        tbl.innerHTML = html;
    }

    var corrChartDom = document.getElementById("chart_corr");
    var corrChart = echarts.init(corrChartDom);

    var corrOption = {
        title: {
            text: "相关性热力图（GDP水平 vs 商品）"
        },
        tooltip: {
            position: "top",
            formatter: function (params) {
                var y = corrVars[params.data[1]];
                var v = params.data[2];
                return y + " 与 中国GDP 的相关系数: " + v.toFixed(2);
            }
        },
        xAxis: {
            type: "category",
            data: corrVars
        },
        yAxis: {
            type: "category",
            data: ["中国GDP"]
        },
        grid: { top: 80, left: "10%", right: "12%", bottom: 60, containLabel: true },
        visualMap: {
            min: -1,
            max: 1,
            calculable: true,
            orient: "vertical",
            left: "right",
            top: "center",
            inRange: {
                color: ["#313695", "#FFFFBF", "#A50026"]
            }
        },
        series: [
            {
                type: "heatmap",
                data: corrData,
                label: {
                    show: true,
                    formatter: function (params) {
                        return params.data[2].toFixed(2);
                    }
                }
            }
        ]
    };

    corrChart.setOption(corrOption);

    var corrDataRel = [];
    for (var j = 0; j < corrVars.length; j++) {
        var v2 = (corrWithRelGdp && corrWithRelGdp[j] != null) ? corrWithRelGdp[j] : 0;
        corrDataRel.push([j, 0, v2]);
    }

    var corrRelDom = document.getElementById("chart_corr_rel");
    var corrRelChart = echarts.init(corrRelDom);

    function formatPValue(p) {
        if (p == null || isNaN(p)) return "-";
        if (p < 0.001) return "<0.001";
        return p.toFixed(3);
    }

    function sigStars(p) {
        if (p == null || isNaN(p)) return "";
        if (p <= 0.01) return "***";
        if (p <= 0.05) return "**";
        if (p <= 0.1) return "*";
        return "";
    }

    var corrRelOption = {
        title: {
            text: "Log相关性热力图（弹性分析：第一产业权重GDP vs 商品）",
            left: "center"
        },
        tooltip: {
            position: "top",
            formatter: function (params) {
                var y = corrVars[params.data[1]];
                var v = params.data[2];
                var p = (typeof pvalWithRelGdp !== "undefined" && pvalWithRelGdp && pvalWithRelGdp[params.data[0]] != null) ? pvalWithRelGdp[params.data[0]] : null;
                var n = (typeof nWithRelGdp !== "undefined" && nWithRelGdp && nWithRelGdp[params.data[0]] != null) ? nWithRelGdp[params.data[0]] : null;
                var extra = "";
                if (p != null || n != null) {
                    extra = " (p=" + formatPValue(p) + (n != null ? ", N=" + n : "") + ")";
                }
                return y + " 与 Log(权重GDP) 的相关系数: " + v.toFixed(2) + extra;
            }
        },
        xAxis: {
            type: "category",
            data: corrVars,
            axisLabel: { rotate: 45 }
        },
        yAxis: {
            type: "category",
            data: ["Log(权重GDP)"]
        },
        grid: { top: 80, left: "10%", right: "12%", bottom: 60, containLabel: true },
        visualMap: {
            min: -1,
            max: 1,
            calculable: true,
            orient: "horizontal",
            left: "center",
            bottom: 10,
            inRange: {
                color: ["#313695", "#FFFFBF", "#A50026"]
            }
        },
        series: [
            {
                type: "heatmap",
                data: corrDataRel,
                label: {
                    show: true,
                    formatter: function (params) {
                        return params.data[2].toFixed(2);
                    }
                }
            }
        ]
    };

    corrRelChart.setOption(corrRelOption);

    var corrDataRelVol = [];
    for (var k = 0; k < corrVars.length; k++) {
        var v3 = (typeof corrWithRelGdpVol !== "undefined" && corrWithRelGdpVol && corrWithRelGdpVol[k] != null) ? corrWithRelGdpVol[k] : 0;
        corrDataRelVol.push([k, 0, v3]);
    }

    var corrRelVolDom = document.getElementById("chart_corr_rel_vol");
    if (corrRelVolDom) {
        var corrRelVolChart = echarts.init(corrRelVolDom);

    var corrRelVolOption = {
        title: {
            text: "Log波动相关性热力图（ΔLog：第一产业权重GDP vs 商品，Lag 0）",
            left: "center"
        },
        tooltip: {
            position: "top",
            formatter: function (params) {
                var y = corrVars[params.data[1]];
                var v = params.data[2];
                var p = (typeof pvalWithRelGdpVol !== "undefined" && pvalWithRelGdpVol && pvalWithRelGdpVol[params.data[0]] != null) ? pvalWithRelGdpVol[params.data[0]] : null;
                var n = (typeof nWithRelGdpVol !== "undefined" && nWithRelGdpVol && nWithRelGdpVol[params.data[0]] != null) ? nWithRelGdpVol[params.data[0]] : null;
                var extra = "";
                if (p != null || n != null) {
                    extra = " (p=" + formatPValue(p) + (n != null ? ", N=" + n : "") + ")";
                }
                return y + " 与 ΔLog(权重GDP) 的相关系数: " + v.toFixed(2) + extra;
            }
        },
        xAxis: {
            type: "category",
            data: corrVars,
            axisLabel: { rotate: 45 }
        },
        yAxis: {
            type: "category",
            data: ["ΔLog(权重GDP)"]
        },
        grid: { top: 80, left: "10%", right: "12%", bottom: 60, containLabel: true },
        visualMap: {
            min: -1,
            max: 1,
            calculable: true,
            orient: "horizontal",
            left: "center",
            bottom: 10,
            inRange: {
                color: ["#313695", "#FFFFBF", "#A50026"]
            }
        },
        series: [
            {
                type: "heatmap",
                data: corrDataRelVol,
                label: {
                    show: true,
                    formatter: function (params) {
                        var p = (typeof pvalWithRelGdpVol !== "undefined" && pvalWithRelGdpVol && pvalWithRelGdpVol[params.data[0]] != null) ? pvalWithRelGdpVol[params.data[0]] : null;
                        var star = p != null ? (p <= 0.01 ? "**" : (p <= 0.05 ? "*" : "")) : "";
                        return params.data[2].toFixed(2) + star;
                    }
                }
            }
        ]
    };

        corrRelVolChart.setOption(corrRelVolOption);
    }

    if (typeof lagSeriesData !== "undefined" && lagSeriesData && lagSeriesData.length > 0) {
        var lagHeatDom = document.getElementById("chart_corr_rel_vol_lag");
        if (lagHeatDom) {
        var lagHeatChart = echarts.init(lagHeatDom);
        var lagShow = (lagKeys && lagKeys.length >= 5) ? lagKeys.slice(0, 5) : lagKeys;
        var lagHeatData = [];
        for (var j = 0; j < corrVars.length; j++) {
            for (var i = 0; i < lagShow.length; i++) {
                var v = (lagSeriesData[j] && lagSeriesData[j][i] != null) ? lagSeriesData[j][i] : 0;
                lagHeatData.push([i, j, v]);
            }
        }
        var lagHeatOption = {
            title: { text: "滞后ΔLog相关性热力图（ΔLog(权重GDP) vs 商品，不同 Lag）", left: "center" },
            tooltip: {
                position: "top",
                formatter: function (params) {
                    var x = lagShow[params.data[0]];
                    var y = corrVars[params.data[1]];
                    var v = params.data[2];
                    return y + " × " + x + " : r = " + (v == null ? "-" : v.toFixed(3));
                }
            },
            grid: { top: 80, left: "8%", right: "10%", bottom: 60, containLabel: true },
            xAxis: { type: "category", data: lagShow, axisLabel: { rotate: 0 } },
            yAxis: { type: "category", data: corrVars },
            visualMap: {
                min: -1, max: 1, calculable: true, orient: "horizontal", left: "center", bottom: 10,
                inRange: { color: ["#313695", "#FFFFBF", "#A50026"] }
            },
            series: [
                { type: "heatmap", data: lagHeatData, label: { show: true, formatter: function (p) { return p.data[2].toFixed(2); } } }
            ]
        };
        lagHeatChart.setOption(lagHeatOption);
        }
    }

    if (typeof lagSeriesDataEWMA !== "undefined" && lagSeriesDataEWMA && lagSeriesDataEWMA.length > 0) {
        var lagHeatDomE = document.getElementById("chart_corr_rel_vol_ewma");
        if (lagHeatDomE) {
        var lagHeatChartE = echarts.init(lagHeatDomE);
        var lagShowE = (lagKeys && lagKeys.length >= 5) ? lagKeys.slice(0, 5) : lagKeys;
        var lagHeatDataE = [];
        for (var j = 0; j < corrVars.length; j++) {
            for (var i = 0; i < lagShowE.length; i++) {
                var v = (lagSeriesDataEWMA[j] && lagSeriesDataEWMA[j][i] != null) ? lagSeriesDataEWMA[j][i] : 0;
                lagHeatDataE.push([i, j, v]);
            }
        }
        var lagHeatOptionE = {
            title: { text: "滞后相关性热力图（EWMA ΔLog 特征）", left: "center" },
            tooltip: { position: "top", formatter: function (p) { var x = lagShowE[p.data[0]]; var y = corrVars[p.data[1]]; var v = p.data[2]; var pp = (typeof lagPvalSeriesDataEWMA !== 'undefined' && lagPvalSeriesDataEWMA[p.data[1]] && lagPvalSeriesDataEWMA[p.data[1]][p.data[0]] != null) ? lagPvalSeriesDataEWMA[p.data[1]][p.data[0]] : null; var star = pp != null ? (pp <= 0.01 ? ' **' : (pp <= 0.05 ? ' *' : '')) : ''; var ptxt = pp != null ? ('; p=' + pp.toFixed(3)) : ''; return y + ' × ' + x + ' : r=' + (v == null ? '-' : v.toFixed(3)) + star + ptxt; } },
            grid: { top: 80, left: "8%", right: "10%", bottom: 60, containLabel: true },
            xAxis: { type: "category", data: lagShowE },
            yAxis: { type: "category", data: corrVars },
            visualMap: { min: -1, max: 1, calculable: true, orient: "horizontal", left: "center", bottom: 10, inRange: { color: ["#313695", "#FFFFBF", "#A50026"] } },
            series: [ { type: "heatmap", data: lagHeatDataE, label: { show: true, formatter: function (p) { var pp = (typeof lagPvalSeriesDataEWMA !== 'undefined' && lagPvalSeriesDataEWMA[p.data[1]] && lagPvalSeriesDataEWMA[p.data[1]][p.data[0]] != null) ? lagPvalSeriesDataEWMA[p.data[1]][p.data[0]] : null; var star = pp != null ? (pp <= 0.01 ? '**' : (pp <= 0.05 ? '*' : '')) : ''; return p.data[2].toFixed(2) + star; } } } ]
        };
        lagHeatChartE.setOption(lagHeatOptionE);
        }
    }
    if (typeof lagSeriesDataShock !== "undefined" && lagSeriesDataShock && lagSeriesDataShock.length > 0) {
        var lagHeatDomS = document.getElementById("chart_corr_rel_vol_shock");
        if (lagHeatDomS) {
        var lagHeatChartS = echarts.init(lagHeatDomS);
        var lagShowS = (lagKeys && lagKeys.length >= 5) ? lagKeys.slice(0, 5) : lagKeys;
        var lagHeatDataS = [];
        for (var j = 0; j < corrVars.length; j++) {
            for (var i = 0; i < lagShowS.length; i++) {
                var v = (lagSeriesDataShock[j] && lagSeriesDataShock[j][i] != null) ? lagSeriesDataShock[j][i] : 0;
                lagHeatDataS.push([i, j, v]);
            }
        }
        var lagHeatOptionS = {
            title: { text: "滞后相关性热力图（预白化冲击）", left: "center" },
            tooltip: { position: "top", formatter: function (p) { var x = lagShowS[p.data[0]]; var y = corrVars[p.data[1]]; var v = p.data[2]; var pp = (typeof lagPvalSeriesDataShock !== 'undefined' && lagPvalSeriesDataShock[p.data[1]] && lagPvalSeriesDataShock[p.data[1]][p.data[0]] != null) ? lagPvalSeriesDataShock[p.data[1]][p.data[0]] : null; var star = pp != null ? (pp <= 0.01 ? ' **' : (pp <= 0.05 ? ' *' : '')) : ''; var ptxt = pp != null ? ('; p=' + pp.toFixed(3)) : ''; return y + ' × ' + x + ' : r=' + (v == null ? '-' : v.toFixed(3)) + star + ptxt; } },
            grid: { top: 80, left: "8%", right: "10%", bottom: 60, containLabel: true },
            xAxis: { type: "category", data: lagShowS },
            yAxis: { type: "category", data: corrVars },
            visualMap: { min: -1, max: 1, calculable: true, orient: "horizontal", left: "center", bottom: 10, inRange: { color: ["#313695", "#FFFFBF", "#A50026"] } },
            series: [ { type: "heatmap", data: lagHeatDataS, label: { show: true, formatter: function (p) { var pp = (typeof lagPvalSeriesDataShock !== 'undefined' && lagPvalSeriesDataShock[p.data[1]] && lagPvalSeriesDataShock[p.data[1]][p.data[0]] != null) ? lagPvalSeriesDataShock[p.data[1]][p.data[0]] : null; var star = pp != null ? (pp <= 0.01 ? '**' : (pp <= 0.05 ? '*' : '')) : ''; return p.data[2].toFixed(2) + star; } } } ]
        };
        lagHeatChartS.setOption(lagHeatOptionS);
        }
    }
    if (typeof lagSeriesData !== 'undefined' && lagSeriesData && typeof lagPvalSeriesData !== 'undefined' && lagPvalSeriesData) {
        if (typeof corrVars !== 'undefined' && corrVars && corrVars.length > 0) {
            var domLag = document.getElementById("chart_corr_rel_vol_lag");

        predConclusionHtml += '<li><b>正向驱动因子 (Positive Drivers):</b>';
        predConclusionHtml += '<ul>';
        for(var i=0; i<Math.min(3, topPredictors.positive.length); i++) {
            var item = topPredictors.positive[i];
            predConclusionHtml += '<li><b>' + item.name + '</b> (Corr: ' + item.value + '): 这是一个非常强的短期预测信号。</li>';
        }
        predConclusionHtml += '</ul></li>';
        predConclusionHtml += '<li><b>负向抑制因子 (Negative Inhibitors):</b>';
        predConclusionHtml += '<ul>';
        for(var i=0; i<Math.min(3, topPredictors.negative.length); i++) {
            var item = topPredictors.negative[i]; // already sorted by ascending in python (most negative first)
             predConclusionHtml += '<li><b>' + item.name + '</b> (Corr: ' + item.value + ')</li>';
        }
        predConclusionHtml += '</ul></li>';
        predConclusionHtml += '</ul>';
        predConclusionHtml += '<p><b>🤖 建模建议：</b> 在构建预测模型（如 VAR 或 XGBoost）时，应优先纳入这些高相关性特征，特别是 <b>棉花滞后项</b> 和 <b>油价滞后项</b>。</p>';
        predConclusionHtml += '</div>';
        
        var predContainer = document.getElementById("chart_predictors");
        predContainer.insertAdjacentHTML('afterend', predConclusionHtml);
        }
    }

 

    (function() {
        if (typeof multivarModel === 'undefined' || !multivarModel || !multivarModel.series) return;

        var fitDom = document.getElementById('chart_multivar_fit');
        var coefDom = document.getElementById('chart_multivar_coef');
        if (!fitDom || !coefDom) return;

        var fitChart = echarts.init(fitDom);
        var coefChart = echarts.init(coefDom);

        var q = multivarModel.series.quarters || [];
        var actual = multivarModel.series.actual || [];
        var pred = multivarModel.series.pred || [];

        var fitOption = {
            title: {
                text: '多变量解释：预测值 vs 实际值（ΔLog 权重GDP）',
                subtext: (multivarModel.r2 != null ? ('R²=' + Number(multivarModel.r2).toFixed(3) + ', RMSE=' + Number(multivarModel.rmse).toFixed(3) + ', N=' + multivarModel.n) : ''),
                left: 'center'
            },
            tooltip: { trigger: 'axis' },
            legend: { top: 50, left: 'center', data: ['实际值', '模型拟合'] },
            grid: { top: 110, left: '8%', right: '6%', bottom: 80, containLabel: true },
            xAxis: { type: 'category', data: q, axisLabel: { rotate: 45 } },
            yAxis: { type: 'value', name: 'ΔLog(第一产业权重GDP)' },
            dataZoom: [{ type: 'slider', start: 0, end: 100 }, { type: 'inside' }],
            series: [
                { name: '实际值', type: 'line', data: actual, smooth: true, symbolSize: 6, lineStyle: { width: 2 } },
                { name: '模型拟合', type: 'line', data: pred, smooth: true, symbolSize: 6, lineStyle: { width: 2, type: 'dashed' } }
            ]
        };
        fitChart.setOption(fitOption);

        var names = multivarModel.features || [];
        var coefStd = multivarModel.coef_std || [];
        var coefRaw = multivarModel.coef || [];

        var rows = [];
        for (var i = 0; i < names.length; i++) {
            rows.push({
                name: names[i],
                std: coefStd[i],
                raw: coefRaw[i]
            });
        }
        rows.sort(function(a, b) {
            return Math.abs(b.std || 0) - Math.abs(a.std || 0);
        });

        var yNames = rows.map(function(r) { return r.name; }).reverse();
        var vals = rows.map(function(r) { return r.std; }).reverse();

        var coefOption = {
            title: {
                text: '多变量解释：标准化系数（影响方向与强度）',
                subtext: '标准化系数便于跨变量比较（绝对值越大影响越强）',
                left: 'center'
            },
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' },
                formatter: function(params) {
                    var idx = params[0].dataIndex;
                    var r = rows[rows.length - 1 - idx];
                    var stdText = (r && r.std != null && isFinite(r.std)) ? Number(r.std).toFixed(3) : '-';
                    var rawText = (r && r.raw != null && isFinite(r.raw)) ? Number(r.raw).toFixed(3) : '-';
                    return params[0].name + '<br/>标准化系数: ' + stdText + '<br/>原始系数: ' + rawText;
                }
            },
            grid: { top: 90, left: '3%', right: '6%', bottom: 30, containLabel: true },
            xAxis: { type: 'value', splitLine: { lineStyle: { type: 'dashed' } } },
            yAxis: { type: 'category', data: yNames, axisLabel: { show: true } },
            series: [
                {
                    name: '标准化系数',
                    type: 'bar',
                    data: yNames.map(function(_, i) {
                        var v = vals[i];
                        return {
                            value: v,
                            itemStyle: { color: v >= 0 ? '#5cb85c' : '#d9534f' }
                        };
                    })
                }
            ]
        };
        coefChart.setOption(coefOption);
        
        var rowsTop = rows.slice(0, Math.min(5, rows.length));
        var listHtml = '<div class="doc-section">';
        listHtml += '<h3>入模变量（前5，按标准化系数绝对值排序）</h3>';
        listHtml += '<ul>';
        for (var i = 0; i < rowsTop.length; i++) {
            var rr = rowsTop[i];
            var sign = (rr.std != null && isFinite(rr.std)) ? (rr.std >= 0 ? '↑' : '↓') : '';
            var stdText = (rr.std != null && isFinite(rr.std)) ? Number(rr.std).toFixed(3) : '-';
            var rawText = (rr.raw != null && isFinite(rr.raw)) ? Number(rr.raw).toFixed(3) : '-';
            listHtml += '<li>' + sign + ' ' + rr.name + '（标准化系数 ' + stdText + '，原始系数 ' + rawText + '）</li>';
        }
        listHtml += '</ul>';
        var r2Text = (multivarModel.r2 != null) ? Number(multivarModel.r2).toFixed(3) : '-';
        var rmseText = (multivarModel.rmse != null) ? Number(multivarModel.rmse).toFixed(3) : '-';
        var nText = (multivarModel.n != null) ? String(multivarModel.n) : '-';
        listHtml += '<p><b>拟合情况：</b>R²=' + r2Text + '，RMSE=' + rmseText + '，N=' + nText + '。R² 表示模型解释到的方差比例，RMSE 表示拟合误差的平均水平。</p>';
        listHtml += '</div>';
        coefDom.insertAdjacentHTML('afterend', listHtml);
    })();

    function renderCorrTable(containerId, title, vars, values, colName) {
        var html = '<div style="font-weight:bold;margin:6px 0;">' + title + '</div>';
        html += '<table>';
        html += '<thead><tr><th>变量</th><th style="text-align:right;">' + (colName || '相关系数') + '</th></tr></thead><tbody>';
        for (var i = 0; i < vars.length; i++) {
            var v = values && values[i] != null ? values[i] : 0;
            html += '<tr><td>' + vars[i] + '</td><td class="value">' + v.toFixed(3) + '</td></tr>';
        }
        html += '</tbody></table>';
        document.getElementById(containerId).innerHTML = html;
    }

    function renderElasticityFullTable(containerId, title, vars) {
        var html = '<div style="font-weight:bold;margin:6px 0;">' + title + '</div>';
        html += '<table>';
        html += '<thead><tr>';
        html += '<th>变量</th>';
        html += '<th style="text-align:right;">典型值 r(Log)</th>';
        html += '<th style="text-align:right;">p</th>';
        html += '<th style="text-align:right;">N</th>';
        html += '<th style="text-align:right;">波动 r(ΔLog)</th>';
        html += '<th style="text-align:right;">p</th>';
        html += '<th style="text-align:right;">N</th>';
        html += '</tr></thead><tbody>';

        for (var i = 0; i < vars.length; i++) {
            var r1 = (corrWithRelGdp && corrWithRelGdp[i] != null) ? corrWithRelGdp[i] : null;
            var p1 = (typeof pvalWithRelGdp !== "undefined" && pvalWithRelGdp && pvalWithRelGdp[i] != null) ? pvalWithRelGdp[i] : null;
            var n1 = (typeof nWithRelGdp !== "undefined" && nWithRelGdp && nWithRelGdp[i] != null) ? nWithRelGdp[i] : null;

            var r2 = (typeof corrWithRelGdpVol !== "undefined" && corrWithRelGdpVol && corrWithRelGdpVol[i] != null) ? corrWithRelGdpVol[i] : null;
            var p2 = (typeof pvalWithRelGdpVol !== "undefined" && pvalWithRelGdpVol && pvalWithRelGdpVol[i] != null) ? pvalWithRelGdpVol[i] : null;
            var n2 = (typeof nWithRelGdpVol !== "undefined" && nWithRelGdpVol && nWithRelGdpVol[i] != null) ? nWithRelGdpVol[i] : null;

            var r1Text = r1 == null ? "-" : (r1.toFixed(3) + sigStars(p1));
            var r2Text = r2 == null ? "-" : (r2.toFixed(3) + sigStars(p2));

            html += '<tr>';
            html += '<td>' + vars[i] + '</td>';
            html += '<td class="value">' + r1Text + '</td>';
            html += '<td class="value">' + formatPValue(p1) + '</td>';
            html += '<td class="value">' + (n1 == null ? "-" : n1) + '</td>';
            html += '<td class="value">' + r2Text + '</td>';
            html += '<td class="value">' + formatPValue(p2) + '</td>';
            html += '<td class="value">' + (n2 == null ? "-" : n2) + '</td>';
            html += '</tr>';
        }

        html += '</tbody></table>';
        document.getElementById(containerId).innerHTML = html;
    }

    renderCorrTable("corr_values_gdp", "GDP水平与商品的相关系数", corrVars, corrWithGdp);
    renderElasticityFullTable("corr_values_rel", "Log(第一产业权重GDP)与Log(商品)的相关系数（典型值）及 Log波动相关（ΔLog）", corrVars);
</script>
