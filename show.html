        /* 动效背景层 */
        .paper-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.8;
        }
        
        /* 贸易路线样式 */
        .ink-stroke {
            fill: none;
            stroke: #8b4513;
            stroke-width: 2.5;
            stroke-dasharray: 8, 8; /* 虚线 */
            stroke-linecap: round;
            opacity: 0; /* 默认隐藏 */
        }

        /* 路径绘制动画 (Draw In) */
        @keyframes drawIn {
            from { stroke-dashoffset: 1000; opacity: 1; }
            to { stroke-dashoffset: 0; opacity: 1; }
        }
        
        /* 路径消失动画 (Fade Out) */
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* 组合动画类 - 利用 animation-delay 实现接力 */
        /* 总周期 18s */
        
        /* 
           优化后的纯 CSS 无限循环动画 
           总周期 (Total Cycle): 21s
           分段 (Segments): 7段
           每段分配 (Time per segment): ~3s
           
           动画逻辑:
           0% -> 10% (前2.1s): 绘制线条 (Draw)
           10% -> 13% (2.1s-2.7s): 保持显示 (Hold)
           13% -> 15% (2.7s-3.15s): 快速淡出 (Fade Out)
           15% -> 100%: 隐藏等待下一次循环 (Wait)
        */

        .trade-route {
            fill: none;
            stroke: #8b4513;
            stroke-width: 2.5;
            stroke-dasharray: 12, 6; /* 更明显的虚线 */
            stroke-linecap: round;
            opacity: 0; /* 初始隐藏 */
        }
        
        /* 
           注意：为了让虚线“生长”，我们需要足够大的 stroke-dasharray 和 offset。
           这里我们使用 stroke-dasharray 来定义虚线样式，
           使用 mask 来做“生长”动画，因为直接动 stroke-dashoffset 会导致虚线滚动而不是生长。
        */
        .trade-mask {
            fill: none;
            stroke: white; 
            stroke-width: 8; /* 遮罩要比线宽，确保完全遮住 */
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
        }

        @keyframes cycleAnimMask {
            0% { stroke-dashoffset: 2000; }
            10% { stroke-dashoffset: 0; } /* 2.1s 画完 */
            100% { stroke-dashoffset: 0; }
        }

        @keyframes cycleAnimLine {
            0% { opacity: 0; }
            1% { opacity: 1; }
            13% { opacity: 1; }
            15% { opacity: 0; } /* 3.15s 消失 */
            100% { opacity: 0; }
        }

        /* 应用动画 - 统一周期 21s，无限循环，不同延迟 */
        /* Segment 1: 0s start */
        .anim-mask-1 { animation: cycleAnimMask 21s linear infinite; animation-delay: 0s; }
        .anim-line-1 { animation: cycleAnimLine 21s linear infinite; animation-delay: 0s; }

        /* Segment 2: 3s start */
        .anim-mask-2 { animation: cycleAnimMask 21s linear infinite; animation-delay: 3s; }
        .anim-line-2 { animation: cycleAnimLine 21s linear infinite; animation-delay: 3s; }

        /* Segment 3: 6s start */
        .anim-mask-3 { animation: cycleAnimMask 21s linear infinite; animation-delay: 6s; }
        .anim-line-3 { animation: cycleAnimLine 21s linear infinite; animation-delay: 6s; }

        /* Segment 4: 9s start */
        .anim-mask-4 { animation: cycleAnimMask 21s linear infinite; animation-delay: 9s; }
        .anim-line-4 { animation: cycleAnimLine 21s linear infinite; animation-delay: 9s; }

        /* Segment 5: 12s start */
        .anim-mask-5 { animation: cycleAnimMask 21s linear infinite; animation-delay: 12s; }
        .anim-line-5 { animation: cycleAnimLine 21s linear infinite; animation-delay: 12s; }

        /* Segment 6: 15s start */
        .anim-mask-6 { animation: cycleAnimMask 21s linear infinite; animation-delay: 15s; }
        .anim-line-6 { animation: cycleAnimLine 21s linear infinite; animation-delay: 15s; }

        /* Segment 7: 18s start */
        .anim-mask-7 { animation: cycleAnimMask 21s linear infinite; animation-delay: 18s; }
        .anim-line-7 { animation: cycleAnimLine 21s linear infinite; animation-delay: 18s; }
        
    </style>

<!-- 信纸装饰动效层 (Paper Decoration Layer) -->
<div id="bg-map" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;"></div>
<div class="paper-decoration">
    <svg width="100%" height="100%" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
        <defs>
            <!-- 
                定义遮罩 (Masks)
                路径经过优化，避开陆地，模拟真实海运航线 (Cubic Bezier Curves)
            -->
            
            <!-- 1. 上海 (920,280) -> 新加坡 (880,380) 
                 路线：沿中国东南沿海，过台湾海峡，经越南沿海 -->
            <mask id="m1">
                <path class="trade-mask anim-mask-1" 
                      d="M920,280 C930,300 925,330 910,350 C900,365 890,370 880,380" />
            </mask>
            
            <!-- 2. 新加坡 (880,380) -> 苏伊士 (650,260)
                 路线：马六甲海峡 -> 绕过斯里兰卡南端 -> 阿拉伯海 -> 亚丁湾 -> 红海 -->
            <mask id="m2">
                <path class="trade-mask anim-mask-2" 
                      d="M880,380 C860,370 820,410 790,360 C770,330 720,320 680,300 C670,295 660,280 650,260" />
            </mask>
            
            <!-- 3. 苏伊士 (650,260) -> 鹿特丹 (580,180)
                 路线：地中海 -> 直布罗陀 -> 绕过葡萄牙/法国 -> 英吉利海峡 -->
            <mask id="m3">
                <path class="trade-mask anim-mask-3" 
                      d="M650,260 C620,255 580,265 550,240 C540,230 540,200 560,190 C570,185 575,182 580,180" />
            </mask>
            
            <!-- 4. 鹿特丹 (580,180) -> 纽约 (280,200)
                 路线：英吉利海峡 -> 北大西洋航线 (大圆航线，略微向南弯曲) -->
            <mask id="m4">
                <path class="trade-mask anim-mask-4" 
                      d="M580,180 C550,190 450,230 280,200" />
            </mask>
            
            <!-- 5. 纽约 (280,200) -> 巴拿马 (250,320)
                 路线：沿美国东岸 -> 佛罗里达海峡 -> 加勒比海 -->
            <mask id="m5">
                <path class="trade-mask anim-mask-5" 
                      d="M280,200 C270,230 290,260 270,280 C260,290 255,300 250,320" />
            </mask>
            
            <!-- 6. 巴拿马 (250,320) -> 洛杉矶 (180,220)
                 路线：沿中美洲西岸 -> 墨西哥沿海 -> 加州 -->
            <mask id="m6">
                <path class="trade-mask anim-mask-6" 
                      d="M250,320 C230,310 210,280 200,260 C190,240 185,230 180,220" />
            </mask>
            
            <!-- 7. 洛杉矶 (180,220) -> 上海 (920,280)
                 路线：太平洋航线 (由于地图投影，分为两段) -->
            <mask id="m7">
                <!-- Part A: LA -> Left Edge (North Pacific) -->
                <!-- Part B: Right Edge -> Japan -> Shanghai -->
                <path class="trade-mask anim-mask-7" 
                      d="M180,220 C100,180 50,180 0,200 M1200,200 C1100,180 1000,240 920,280" />
            </mask>
        </defs>
        
        <g id="trade-paths" opacity="0.8">
            <!-- 1. Shanghai -> Singapore -->
            <path class="trade-route anim-line-1" mask="url(#m1)" 
                  d="M920,280 C930,300 925,330 910,350 C900,365 890,370 880,380" />
            
            <!-- 2. Singapore -> Suez -->
            <path class="trade-route anim-line-2" mask="url(#m2)" 
                  d="M880,380 C860,370 820,410 790,360 C770,330 720,320 680,300 C670,295 660,280 650,260" />
            
            <!-- 3. Suez -> Rotterdam -->
            <path class="trade-route anim-line-3" mask="url(#m3)" 
                  d="M650,260 C620,255 580,265 550,240 C540,230 540,200 560,190 C570,185 575,182 580,180" />
            
            <!-- 4. Rotterdam -> New York -->
            <path class="trade-route anim-line-4" mask="url(#m4)" 
                  d="M580,180 C550,190 450,230 280,200" />
            
            <!-- 5. New York -> Panama -->
            <path class="trade-route anim-line-5" mask="url(#m5)" 
                  d="M280,200 C270,230 290,260 270,280 C260,290 255,300 250,320" />
            
            <!-- 6. Panama -> Los Angeles -->
            <path class="trade-route anim-line-6" mask="url(#m6)" 
                  d="M250,320 C230,310 210,280 200,260 C190,240 185,230 180,220" />
            
            <!-- 7. Los Angeles -> Shanghai -->
            <path class="trade-route anim-line-7" mask="url(#m7)" 
                  d="M180,220 C100,180 50,180 0,200 M1200,200 C1100,180 1000,240 920,280" />
        </g>
    </svg>
</div>

    function pickBestLagIndex(arr, pvals) {
        var bestIdx = -1;

        if (arr && arr.length) {
            for (var i = 0; i < arr.length; i++) {
                var v = arr[i];
                if (v == null || isNaN(v)) continue;
                var p = (pvals && pvals[i] != null) ? pvals[i] : null;
                if (p == null || isNaN(p) || p > 0.05) continue;
                var a = Math.abs(v);
                if (a > bestAbs) {
                    bestAbs = a;
                    bestIdx = i;
                }
            }
            if (bestIdx < 0) {
                bestAbs = -1;
                for (var k = 0; k < arr.length; k++) {
                    var vv = arr[k];
                    if (vv == null || isNaN(vv)) continue;
                    var aa = Math.abs(vv);
                    if (aa > bestAbs) {
                        bestAbs = aa;
                        bestIdx = k;
                    }
                }
            }
        }
        return bestIdx;
    }

    function renderVolLagSummaryTable(containerId, title, vars, lagKeys, lagSeries, lagPvals) {
        var dom = document.getElementById(containerId);
        if (!dom) return;
        if (!vars || !lagKeys || !lagSeries) return;

        var html = '<div style="font-weight:bold;margin:6px 0;">' + title + '</div>';
        html += '<table>';
        html += '<thead><tr>';
        html += '<th>变量</th>';
        html += '<th style="text-align:right;">Lag 0 r</th>';
        html += '<th style="text-align:right;">p</th>';
        html += '<th style="text-align:right;">最佳滞后</th>';
        html += '<th style="text-align:right;">r</th>';
        html += '<th style="text-align:right;">p</th>';
        html += '</tr></thead><tbody>';

        for (var j = 0; j < vars.length; j++) {
            var arr = lagSeries[j] || [];
            var parr = (lagPvals && lagPvals[j]) ? lagPvals[j] : [];

            var lag0r = (arr.length > 0 && arr[0] != null) ? arr[0] : null;
            var lag0p = (parr.length > 0 && parr[0] != null) ? parr[0] : null;

            var bestIdx = -1;
            var bestAbs = -1;
            for (var i = 0; i < arr.length; i++) {
                var v = arr[i];
                if (v == null) continue;
                var p = (parr && parr[i] != null) ? parr[i] : null;
                if (p == null || p > 0.05) continue;
                var a = Math.abs(v);
                if (a > bestAbs) {
                    bestAbs = a;
                    bestIdx = i;
                }
            }
            if (bestIdx < 0) {
                bestAbs = -1;
                for (var k = 0; k < arr.length; k++) {
                    var vv = arr[k];
                    if (vv == null) continue;
                    var aa = Math.abs(vv);
                    if (aa > bestAbs) {
                        bestAbs = aa;
                        bestIdx = k;
                    }
                }
            }

            var bestLag = (bestIdx >= 0 && lagKeys[bestIdx] != null) ? lagKeys[bestIdx] : "-";
            var bestr = (bestIdx >= 0 && arr[bestIdx] != null) ? arr[bestIdx] : null;
            var bestp = (bestIdx >= 0 && parr && parr[bestIdx] != null) ? parr[bestIdx] : null;

            var lag0rText = lag0r == null ? "-" : (Number(lag0r).toFixed(3) + sigStars(lag0p));
            var bestrText = bestr == null ? "-" : (Number(bestr).toFixed(3) + sigStars(bestp));

            html += '<tr>';
            html += '<td>' + vars[j] + '</td>';
            html += '<td class="value">' + lag0rText + '</td>';
            html += '<td class="value">' + formatPValue(lag0p) + '</td>';
            html += '<td class="value">' + bestLag + '</td>';
            html += '<td class="value">' + bestrText + '</td>';
            html += '<td class="value">' + formatPValue(bestp) + '</td>';
            html += '</tr>';
        }

        html += '</tbody></table>';
        dom.innerHTML = html;
    }

                        <li><strong>中期影响 (Medium-term):</strong> 小麦 (Wheat) 和 棕榈油 (Palm Oil) 分别在滞后 2 和 4 个季度显示出最强的相关性，显示出一定的传导时滞。</li>
                        <li><strong>长期影响 (Long-term):</strong> 原油 (Oil)、玉米 (Maize) 和 大豆 (Soybeans) 的影响具有较长的滞后性 (6-8个季度)。特别是原油波动率在滞后 6 个季度时表现出负相关 (-0.1594)，符合能源价格波动长期抑制经济增长的理论预期。</li>
                        <li><strong>相关性方向:</strong> 大部分农作物波动率在特定滞后期表现出正相关，这可能反映了价格波动与经济活跃度（需求拉动）的某种同步或领先关系；而原油和大豆的负相关则更多体现了成本冲击带来的负面影响。</li>
                    </ul>
                    <p><strong>最佳滞后点选择建议:</strong> 在构建预测模型或进行因果分析时，建议对不同作物采用上述识别出的最佳滞后阶数，以捕捉最显著的经济传导效应。</p>
                `;
                document.getElementById('lag_analysis_text').innerHTML = analysisHtml;
            }
        }
